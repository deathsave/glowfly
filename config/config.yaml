#config_version=6

virtual_platform_start_active_switches:
    - s_trough1
    - s_trough2
    - s_trough3

keyboard:
    s:
        event: #start game

hardware:
    platform: fast

fast:
    net:
        controller: neuron
        io_loop:
            cabinet_board:
                model: FP-I/O-0024
                order: 1
            1616:
                model: FP-I/O-1616
                order: 2
            3208:
                model: FP-I/O-3208
                order: 3
        port: auto
        baud: 921600
        debug: false
        watchdog: 1s
        default_quick_debounce_open: 2ms
        default_quick_debounce_close: 2ms
        default_normal_debounce_open: 4ms
        default_normal_debounce_close: 4ms
        tags: r_cab, cabinet

switches:
    s_left_flipper:
        number: cabinet_board-15
        tags: left_flipper
    s_right_flipper:
        number: cabinet_board-14
        tags: right_flipper
    s_trough_jam:
        number: 1616-1
        type: NC
    s_trough1:
        number: 1616-2
        type: NC
    s_trough2:
        number: 1616-3
        type: NC
    s_trough3:
        number: 1616-4
        type: NC
    s_shooter_lane:
        number: 1616-6
    s_start:
        number: cabinet_board-23
        tags: start
    s_left_outlane:
        number: 1616-9
        tags: playfield_active
    s_left_inlane:
        number: 1616-10
        tags: playfield_active
    s_left_sling:
        number: 1616-11
    s_right_sling:
        number: 1616-13
    s_right_inlane:
        number: 1616-15
        tags: playfield_active
    s_r_outlane:
        number: 1616-16
        tags: playfield_active
    s_curve_left:
        number: 3208-1
    s_left_lock:
        number: 3208-2
    s_left_approach:
        number: 3208-3
        type: NC
    s_target_g:
        number: 3208-4
        tags: playfield_active
    s_target_l:
        number: 3208-5
        tags: playfield_active
    s_target_o:
        number: 3208-6
        tags: playfield_active
    s_target_w:
        number: 3208-7
        tags: playfield_active
    s_core_left:
        number: 3208-8
    s_core_right:
        number: 3208-9
    s_right_approach:
        number: 3208-10
        type: NC
#not added yet
#    s_path_spinner:
#        number: 3208-11
    s_uramp_left:
        number: 3208-12
        type: NC
#not added yet
#    s_uramp_spinner:
#        number: 3208-1
    s_uramp_right:
        number: 3208-14
        type: NC
    s_curve_right:
        number: 3208-15
    s_qp_left:
        number: 3208-17
        type: NC
    s_lane_f:
        number: 3208-18
    s_lane_l:
        number: 3208-19
    s_lane_y:
        number: 3208-20
    s_qp_right:
        number: 3208-21
        type: NC

coils:
    c_flipper_left_main:
        number: 1616-0
        default_pulse_ms: 20
    c_flipper_left_hold:
        number: 1616-1
        allow_enable: true
    c_flipper_right_main:
        number: 1616-2
        default_pulse_ms: 20
    c_flipper_right_hold:
        number: 1616-3
        allow_enable: true
    c_plunger:
        number: 1616-7
        default_pulse_ms: 18
    c_trough_eject:
        number: 1616-6
        default_pulse_ms: 12
    c_sling_left:
        number: 1616-4
        default_pulse_ms: 8
    c_sling_right:
        number: 1616-5
        default_pulse_ms: 8
    c_gate:
        number: 1616-8
        default_pulse_ms: 8
        default_hold_power: .625
    c_lock_launcher:
        number: 1616-9
        default_pulse_ms: 25
    c_glow_lower:
        number: 3208-0
        allow_enable: true
    c_glow_right:
        number: 3208-1
        allow_enable: true
    c_glow_left:
        number: 3208-2
        allow_enable: true
    c_glow_center:
        number: 3208-3
        allow_enable: true
#    c_glow_qp_left:
#        number: 3208-4
#        allow_enable: true
#    c_glow_qp_right:
#        number: 3208-5
#        allow_enable: true

ball_devices:
    bd_trough:
        ball_switches: s_trough1, s_trough2, s_trough3, s_trough_jam
        eject_coil: c_trough_eject
        eject_targets: bd_plunger
        eject_timeouts: 3s
        tags: trough, home, drain
        jam_switch: s_trough_jam
        eject_coil_jam_pulse: 15ms
        debug: true
    bd_plunger:
        ball_switches: s_shooter_lane
        eject_coil: c_plunger
        mechanical_eject: true
        eject_timeouts: 3s
    bd_left_lock:
        ball_switches: s_left_lock
        eject_coil: c_lock_launcher
        eject_timeouts: 3s
        tags: lock, launcher

diverters:
    left_lock_gate:
        activation_coil: c_gate
        type: hold
        activation_time: 3s
        enable_events: ball_started, s_left_lock_inactive
        disable_events: ball_ended, s_left_lock_active
        targets_when_active: bd_left_lock
        targets_when_inactive: playfield
autofire_coils:
    ac_slingshot_left:
        coil: c_sling_left
        switch: s_left_sling
    ac_slingshot_right:
        coil: c_sling_right
        switch: s_right_sling

playfields:
    playfield:
        tags: default
        default_source_device: bd_plunger

flippers:
#these flippers are setup for dual-wound coils, computer controlled
#to switch from high power to hold power automatically when the flipper button
#is held down --no end of stroke switch required
    left_flipper:
        main_coil: c_flipper_left_main
        hold_coil: c_flipper_left_hold
        activation_switch: s_left_flipper
    right_flipper:
        main_coil: c_flipper_right_main
        hold_coil: c_flipper_right_hold
        activation_switch: s_right_flipper

displays:
    window:
        width: 1920
        height: 1080

sound_system:
    buffer: 1024
    channels: 1
    enabled: true
    frequency: 44100
    tracks:
        music:
            type: standard
            simultaneous_sounds: 1
            volume: 0.5
        voice:
            type: standard
            simultaneous_sounds: 1
            volume: 0.9
        sfx:
            type: standard
            simultaneous_sounds: 8
            volume: 0.6

machine_vars:
    master_volume:
        initial_value: 0.8

player_vars:
    pop_bumper_hits:
        initial_value: 0

modes:
    - base
    - bonus
    - high_score

slides:
    welcome_slide:
        widgets:
            - type: text
              text: IF YOU SEE THIS, SOMETHING IS WRONG!
              font_size: 50
              color: red
            - type: rectangle
              width: 240
              height: 60
    attract_started:
        widgets:
            - type: image
              image: ADD_ME
    final_score_slide:
        widgets:
            - type: text
              text: FINAL SCORE
              font_size: 42
              color: black
              y: 900
              x: 1120
              anchor_x: left
              anchor_y: top
            - type: image
              image: final_score
    base_slide:
        widgets:
            - type: text
              text: (player1|score)
              number_grouping: true
              min_digits: 2
              font_size: 45
              color: black
              y: 108
              x: 413
              anchor_x: right
              anchor_y: bottom
            - type: text
              text: PLAYER (number)
              y: 365
              x: 20
              font_size: 50
              anchor_x: left
              anchor_y: bottom
            - type: text
              text: BALL (ball)
              y: 295
              x: 20
              anchor_x: left
              anchor_y: bottom
              font_size: 50
            - type: image
              image: base_background1



widget_player:
    player_added{num==2}:
        player2_scoring:
            slide: base_slide
    player_added{num==3}:
        player3_scoring:
            slide: base_slide
    player_added{num==4}:
        player4_scoring:
            slide: base_slide

widgets:
    player2_scoring:
        - type: text
          text: (player2|score)
          number_grouping: true
          min_digits: 2
          font_size: 45
          color: black
          y: 108
          x: 875
          z: 5
          anchor_x: right
          anchor_y: bottom
    player3_scoring:
        - type: text
          text: (player3|score)
          number_grouping: true
          min_digits: 2
          font_size: 45
          color: black
          y: 108
          x: 1335
          z: 5
          anchor_x: right
          anchor_y: bottom
    player4_scoring:
        - type: text
          text: (player4|score)
          number_grouping: true
          min_digits: 2
          font_size: 45
          color: black
          y: 108
          x: 1795
          z: 5
          anchor_x: right
          anchor_y: bottom

widget_styles:
    attract_mode_high_score_display_label:
        font_size: 40
        anchor_x: right
        anchor_y: top
        x: center-110
        bold: true
    attract_mode_high_score_display_name:
        font_size: 40
        anchor_x: right
        anchor_y: top
        x: center+150
    attract_mode_high_score_display_score:
        font_size: 40
        anchor_x: left
        anchor_y: top
        x: center+240
        number_grouping: true
        min_digits: 1
    attract_mode_final_score_display_player_number:
        font_size: 40
        anchor_x: center
        anchor_y: top
        x: center-80
        bold: true
    attract_mode_final_score_display_score:
        font_size: 40
        anchor_x: left
        anchor_y: top
        x: center+60
        number_grouping: true
        min_digits: 1

assets:
    sounds:
        default:
            load: on_demand
        music:
            track: music
        sfx:
            track: sfx
        voice:
            track: voice


slide_player:
    init_done: welcome_slide
    mode_attract_started: attract_started
    game_ending:
        final_score_slide:
            expire: 30s
