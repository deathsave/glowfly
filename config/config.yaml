#config_version=6

virtual_platform_start_active_switches:
    - s_trough1
    - s_trough2
    - s_trough3

keyboard:
    s:
        event: #start game

hardware:
    platform: fast

fast:
  net:
    controller: neuron
    io_loop:
      cabinet_board:
        model: FP-I/O-0024
        order: 1
      1616:
        model: FP-I/O-1616
        order: 2
    port: auto
    baud: 921600
    debug: false
    watchdog: 1s
    default_quick_debounce_open: 2ms
    default_quick_debounce_close: 2ms
    default_normal_debounce_open: 4ms
    default_normal_debounce_close: 4ms
  exp:
    boards:
      neuron:
        model: FP-EXP-2000
      playfield:
        model: FP-EXP-0081

