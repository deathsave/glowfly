#config_version=6


show_player:
    start_attract_shows:
        glass_wave_reveal_show:
            loops: 3
            speed: 1
            events_when_completed: start_rainbow_show
        attract_loop_show:
            loops: -1
    mode_attract_stopping:
        attract_loop_show:
            action: stop
        glass_wave_reveal_show:
            action: stop
        cabinet_mini_rainbow_show:
            action: stop
    start_rainbow_show:
        cabinet_mini_rainbow_show:
            loops: 2
            events_when_completed: start_wave_show
    start_wave_show:
        glass_wave_reveal_show:
            loops: 3
            events_when_completed: start_rainbow_show
            speed: 1

light_player:
    test_all_lights_white:
        lamps: "ffffff"
    test_apron_cab_white:
        cabinet: "ffffff"
        apron: "ffffff"
    test_all_lights_white_50:
        lamps: "999999"
    test_all_lights_red_50:
        lamps: "990000"
    test_all_lights_out:
        lamps: "000000"
slides:
    dspc_logo_slide:
        widgets:
            - type: video
              video: dspc_animation
              width: 782
              height: 440
              x: left+241
            - type: text
              text: Deathsave Pinball Cult
              x: middle+300
              y: center+70
              color: white
              font_size: 90
            - type: text
              text: Presents
              x: middle+300
              y: center-70
              color: white
              font_size: 90
    glowfly_title_slide:
        widgets:
            type: image
            image: glowfly_title
