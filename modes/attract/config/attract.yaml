#config_version=6


show_player:
    start_attract_shows:
        glass_wave_reveal_show:
            loops: 3
            speed: 1
            events_when_completed: start_rainbow_show
            priority: 1
        attract_loop_show:
            loops: -1
            priority: 2
        attract_backbox_show:
            loops: -1
            priority: 3
            speed: 1
    mode_attract_stopping:
        attract_loop_show:
            action: stop
        glass_wave_reveal_show:
            action: stop
        cabinet_mini_rainbow_show:
            action: stop
    start_rainbow_show:
        cabinet_mini_rainbow_show:
            loops: 2
            events_when_completed: start_wave_show
    start_wave_show:
        glass_wave_reveal_show:
            loops: 3
            events_when_completed: start_rainbow_show
            speed: 1
    left_flips_full:
        glass_wave_reveal_show:
            action: stop
        cabinet_mini_rainbow_show:
            action: stop
    right_flips_full:
        glass_wave_reveal_show:
            action: stop
        cabinet_mini_rainbow_show:
            action: stop

light_player:
    mode_attract_started:
        bbox: "ffffff"
    test_all_lights_white:
        lamps: "ffffff"
    test_apron_cab_white:
        cabinet: "ffffff"
        apron: "ffffff"
    test_all_lights_white_50:
        lamps: "999999"
    test_all_lights_red_50:
        lamps: "990000"
    test_all_lights_out:
        lamps: "000000"
    left_flips_full:
        l_left_lane_block1: red
        l_left_lane_block2: red
        l_left_lane_block3: orange
        l_left_lane_block4: orange
        l_left_lane_block5: gold
        l_left_lane_block6: gold
        l_left_lane_block7: green
        l_left_lane_block8: green
        l_left_lane_block9: blue
        l_left_lane_block10: blue
        l_left_lane_block11: purple
        l_left_lane_block12: purple
    right_flips_full:
        l_right_lane_block1: red
        l_right_lane_block2: red
        l_right_lane_block3: orange
        l_right_lane_block4: orange
        l_right_lane_block5: gold
        l_right_lane_block6: gold
        l_right_lane_block7: green
        l_right_lane_block8: green
        l_right_lane_block9: blue
        l_right_lane_block10: blue
        l_right_lane_block11: purple
        l_right_lane_block12: purple
slides:
    dspc_logo_slide:
        widgets:
            - type: video
              video: dspc_animation
              width: 782
              height: 440
              x: left+241
            - type: text
              text: Deathsave Pinball Cult
              x: middle+300
              y: center+70
              color: white
              font_size: 90
            - type: text
              text: Presents
              x: middle+300
              y: center-70
              color: white
              font_size: 90
    glowfly_title_slide:
        widgets:
            type: image
            image: glowfly_title
            scale: .9
