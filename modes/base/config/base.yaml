        transitions:
            - source: lit
              target: hit
              events: y_lane_shot_hit
            - source: hit
              target: lit
              events: reset_glowfly_targets


slides:
    base_score_slide:
        widgets:
            - type: text
              text: (player|score)
              number_grouping: true
              min_digits: 2
              font_size: 240
              font_name: pixelmix
              color: white
            - type: text
              text: PLAYER (number)
              anchor_x: left
              anchor_y: top
              x: left+20
              y: top-20
              font_name: pixelmix
              font_size: 42
              color: white

slide_player:
    mode_base_started: base_score_slide
    s_shooter_lane_active:
        shooter_lane_slide:
            action: play
    s_shooter_lane_inactive:
        shooter_lane_slide:
            action: remove


