            lit:
                label: Start state
                events_when_started: l_lane_lit
            hit:
                show_when_active:
                    show: l_lane_light_show
                events_when_started: l_lane_hit
        transitions:
            - source: lit
              target: hit
              events: l_lane_shot_hit
            - source: hit
              target: lit
