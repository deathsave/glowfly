#config_version=6
mode:
    start_events: ball_started
    priority: 100

ball_saves:
    ball_start_ball_save:
        active_time: 10s
        hurry_up_time: 5s
        timer_start_events: sw_playfield_active
        auto_launch: true
        balls_to_save: 1

state_machines:
    g_target_status:
        starting_state: lit
        states:
            lit:
                label: Start state
                events_when_started: g_target_lit
            hit:
                show_when_active:
                    show: g_target_light_show
                events_when_started: g_target_hit
        transitions:
            - source: lit
              target: hit
              events: g_target_shot_hit
            - source: hit
              target: lit
              events: reset_glowfly_targets
    l_target_status:
        starting_state: lit
        states:
            lit:
                label: Start state
                events_when_started: l_target_lit
            hit:
                show_when_active:
                    show: l_target_light_show
                events_when_started: l_target_hit
        transitions:
            - source: lit
              target: hit
              events: l_target_shot_hit
            - source: hit
              target: lit
              events: reset_glowfly_targets
    o_target_status:
