shots:
    qp_assist_shot:
        switches: s_left_approach
        enable_events: s_right_inlane_active
        disable_events: ball_ending, s_left_lock_active, diverter_left_lock_gate_activating
        delay_switch:
            s_right_approach: 5s
    curve_right_shot:
        switches: s_curve_right
        delay_switch:
            s_core_left: 2s
        enable_events: sw_playfield_active
    curve_left_shot:
        switches: s_curve_left
        delay_switch:
            s_core_right: 2s
    center_spinner_shot:
        switches: s_center_spinner
    g_target_shot:
        switches: s_target_g
    l_target_shot:
        switches: s_target_l
    o_target_shot:
        switches: s_target_o
    w_target_shot:
        switches: s_target_w
    f_lane_shot:
        switches: s_lane_f
#        show_tokens:
#            light: f
    l_lane_shot:
        switches: s_lane_l
#        show_tokens:
#            light: l
    y_lane_shot:
        switches: s_lane_y
#        show_tokens:
#            light: y
    ramp_right_entry_shot:
        switches: s_uramp_right
        delay_switch:
            s_uramp_left: 2s
    ramp_left_entry_shot:
        switches: s_uramp_left
        delay_switch:
            s_uramp_right: 2s
    slingshot_r:
        switches: s_right_sling
    slingshot_l:
        switches: s_left_sling
    shooter_lane_loaded:
        switches: s_shooter_lane
        disable_events: s_shooter_lane_inactive
    left_approach_shot:
        switches: s_left_approach
        delay_switch:
            s_right_approach: 4s
    right_approach_shot:
        switches: s_right_approach
        delay_switch:
            s_left_approach: 4s
        enable_events: mode_base_started, relight_right_approach
        disable_events: right_approach_shot_hit
    ricochet_shot:
        switches: s_ricochet_bumper


sequence_shots:
#    left_approach_fail_shot:
#        event_sequence: s_left_approach_active, s_left_approach_active
#        sequence_timeout: 10s
#        cancel_switches: s_right_approach, s_lane_f, s_lane_l, s_lane_y
    clockwise_core_shot:
        switch_sequence: s_core_left, s_core_right
        sequence_timeout: 3s
    counterwise_core_shot:
        switch_sequence: s_core_right, s_core_left
        sequence_timeout: 3s
    left_uturn_shot:
        switch_sequence: s_uramp_left, s_uramp_right
        sequence_timeout: 2s
    right_uturn_shot:
        switch_sequence: s_uramp_right, s_uramp_left
        sequence_timeout: 2s
    right_qp_full:
        switch_sequence: s_right_approach, s_left_approach
        sequence_timeout: 3s
    left_qp_full:
        switch_sequence: s_left_approach, s_right_approach
        sequence_timeout: 3s
    curve_right_core_shot:
        event_sequence: curve_right_shot_hit, clockwise_core_shot_hit
        sequence_timeout: 4s
    curve_left_core_shot:
        event_sequence: curve_left_shot_hit, counterwise_core_shot_hit
        sequence_timeout: 4s
    left_full_core_shot:
        event_sequence: curve_left_core_shot_hit, s_curve_right_active
        sequence_timeout: 2s
    right_full_core_shot:
        event_sequence: curve_right_core_shot_hit, s_curve_left_active
        sequence_timeout: 2s
    core_sneak_in:
        event_sequence: center_spinner_shot_hit, counterwise_core_shot_hit
        sequence_timeout: 3s

