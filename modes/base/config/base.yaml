#config_version=6
mode:
    start_events: ball_started
    priority: 100

ball_saves:
    ball_start_ball_save:
        active_time: "+5s"
        hurry_up_time: 6s
        timer_start_events: s_shooter_lane_inactive
        auto_launch: true
        balls_to_save: 1

slides:
    base_score_slide:
        widgets:
            - type: text
              text: (player|score)
              number_grouping: true
              min_digits: 2
              font_size: 240
              font_name: pixelmix
              color: white

slide_player:
    mode_base_started: base_score_slide

light_player:
    s_shooter_lane_active:
        lamps: off
        cabinet: off

show_player:
    s_shooter_lane_active:
        base_glimmer_show:
            action: stop
    s_shooter_lane_inactive:
        base_glimmer_show:
            loops: -1
            show_tokens:
                color1: "ffffff"
                color2: red
    test_glow_coil:
        base_glimmer_show:
            action: stop
    s_left_flipper_active:
        base_lights_out_show:
            action: play
            loops: -1
            priority: 100
    s_right_flipper_active:
        base_lights_out_show:
            action: play
            loops: -1
            priority: 100
    s_left_flipper_inactive:
        base_lights_out_show:
            action: stop
    s_right_flipper_inactive:
        base_lights_out_show:
            action: stop



coil_player:
    mode_base_started:
        glow_coil: on
    ball_ending:
        glow_coil: off
    s_shooter_lane_active:
        c_glow_shooter_lane: on
    s_shooter_lane_inactive:
        c_glow_shooter_lane: off

shots:
    curve_right_shot:
        switches: s_curve_right
        delay_switch:
            s_core_left: 2s
    curve_left_shot:
        switches: s_curve_left
        delay_switch:
            s_core_right: 2s
    center_spinner_shot:
        switches: s_center_spinner
    g_target_shot:
        switches: s_target_g
    l_target_shot:
        switches: s_target_l
    o_target_shot:
        switches: s_target_o
    w_target_shot:
        switches: s_target_w
    f_lane_shot:
        switches: s_lane_f
    l_lane_shot:
        switches: s_lane_f
    y_lane_shot:
        switches: s_lane_y

sequence_shots:
    clockwise_core_shot:
        switch_sequence: s_core_left, s_core_right
        sequence_timeout: 3s
    counterwise_core_shot:
        switch_sequence: s_core_right, s_core_left
        sequence_timeout: 3s
    left_uturn_shot:
        switch_sequence: s_uramp_left, s_uramp_right
        sequence_timeout: 2s
    right_uturn_shot:
        switch_sequence: s_uramp_right, s_uramp_left
        sequence_timeout: 2s
    right_qp_full:
        switch_sequence: s_right_approach, s_left_approach
        sequence_timeout: 3s
    left_qp_full:
        switch_sequence: s_left_approach, s_right_approach
        sequence_timeout: 3s
    curve_right_core_shot:
        event_sequence: curve_right_shot_hit, clockwise_core_shot_hit
        sequence_timeout: 4s
    curve_left_core_shot:
        event_sequence: curve_left_shot_hit, counterwise_core_shot_hit
        sequence_timeout: 4s
    left_full_core_shot:
        event_sequence: curve_left_core_shot_hit, s_curve_right_active
        sequence_timeout: 2s
    right_full_core_shot:
        event_sequence: curve_right_core_shot_hit, s_curve_left_active
        sequence_timeout: 2s
    core_sneak_in:
        event_sequence: center_spinner_shot_hit, counterwise_core_shot_hit
        sequence_timeout: 3s

sound_player:
    mode_base_started:
        glowfly_main_infinity_full:
            action: play
    ball_ending:
        glowfly_main_infinity_full:
            action: stop
    curve_left_shot_hit:
        left_1:
            action: play
    curve_right_shot_hit:
        right_1:
            action: play
    s_core_left_active:
        left_2b:
            action: play
    s_core_right_active:
        left_2a:
            action: play
    left_full_core_shot_hit:
        left_3:
            action: play
    right_full_core_shot_hit:
        right_3:
            action: play

variable_player:
    curve_right_shot_hit:
        score: 1000
    curve_left_shot_hit:
        score: 1000
    curve_left_core_shot_hit:
        score: 5000
    curve_right_core_shot_hit:
        score: 5000
    left_full_core_shot:
        score: 10000
    right_full_score_shot:
        score: 10000
