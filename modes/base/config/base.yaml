event_player:
    glowfly_shots_complete: reset_glowfly_targets

show_player:
    s_shooter_lane_active:
        launch_the_ball_show:
            action: play
            loops: -1
            speed: .5
    s_shooter_lane_inactive:
        base_set_stage_show:
            loops: 0
        launch_the_ball_show:
            action: stop
    base_set_stage2:
        ramp_lit_show:
            action: play
            loops: -1
            show_tokens:
                color: red
        base_lanes_show:
            action: play
            loops: -1
            speed: 1
        base_slings_gi_show:
            action: play
            loops: -1
        base_core_show:
            action: play
            loops: -1
            show_tokens:
                color: red
#        base_apron_show:
#            action: play
#            loops: -1
#            show_tokens:
#                color: white
        base_cab_show:
            action: play
            loops: -1
            show_tokens:
                color: red
                color2: "880000"
    right_trap_detected:
        right_trap_show:
            action: play
            loops: -1
        left_trap_show:
            action: stop
    right_trap_released:
        right_trap_show:
            action: stop
    left_trap_detected:
        left_trap_show:
            action: play
            loops: -1
        right_trap_show:
            action: stop
    left_trap_released:
        left_trap_show:
            action: stop
    relight_ramp_shots:
        ramp_lit_show:
            action: play
            loops: -1
            show_tokens:
                color: red
#shows for shots
    curve_left_shot_hit:
        base_lights_out_show:
            action: play
            loops: 0
            priority: 50
            speed: 2
    curve_right_shot_hit:
        base_lights_out_show:
            action: play
            loops: 0
            priority: 50
            speed: 2
    ramp_left_entry_shot_hit:
        ramp_lit_show:
            action: stop
        ramp_l_attempt_show:
            action: play
            loops: 0
            show_tokens:
                color: red
    left_uturn_shot_hit:
        ramp_l_complete_show:
            loops: 0
            show_tokens:
                color: red
    ramp_right_entry_shot_hit:
        ramp_lit_show:
            action: stop
        ramp_r_attempt_show:
            action: play
            loops: 0
            show_tokens:
                color: red
    right_uturn_shot_hit:
        ramp_r_complete_show:
            loops: 0
            show_tokens:
                color: red
    f_lane_shot_hit:
        lane_shot_hit_show:
            loops: 0
    l_lane_shot_hit:
        lane_shot_hit_show:
            loops: 0
    y_lane_shot_hit:
        lane_shot_hit_show:
            loops: 0
    right_approach_shot_hit:
        right_approach_show:
            loops: 0
            speed: 2
    left_approach_shot_hit:
        left_approach_show:
            loops: 0
            speed: 2
    slingshot_l_hit:
        short_left_sling_show:
            loops: 0
            speed: 1
            priority: 101
    slingshot_r_hit:
        short_right_sling_show:
            loops: 0
            speed: 1
            priority: 101

#ball save shows
    ball_save_ball_start_ball_save_timer_start:
