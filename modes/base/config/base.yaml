#config_version=6
mode:
    start_events: ball_started
    priority: 100

ball_saves:
    ball_start_ball_save:
        active_time: 10s
        hurry_up_time: 5s
        timer_start_events: sw_playfield_active
        auto_launch: true
        balls_to_save: 1

slides:
    base_score_slide:
        widgets:
            - type: text
              text: (player|score)
              number_grouping: true
              min_digits: 2
              font_size: 240
              font_name: pixelmix
              color: white
            - type: text
              text: PLAYER (number)
              anchor_x: left
              anchor_y: top
              x: left+20
              y: top-20
              font_name: pixelmix
              font_size: 42
              color: white

slide_player:
    mode_base_started: base_score_slide

light_player:
    s_shooter_lane_active:
        lamps: off
        cabinet: off
    base_set_stage1:
        qp: off
        ramp: off
        mid: on
        lower: on
    base_set_stage2:
        rampgi: on



show_player:
    s_shooter_lane_active:
        base_glimmer_show:
            action: stop
    s_shooter_lane_inactive:
        base_set_stage_show:
            loops: 0
    base_set_stage2:
        ramp_lit_show:
            action: play
            loops: -1
            show_tokens:
                color: red
        base_lanes_show:
            action: play
            loops: -1
            speed: 1
        base_slings_gi_show:
            action: play
            loops: -1
        base_core_show:
            action: play
            loops: -1
            show_tokens:
                color: red
        base_apron_show:
            action: play
            loops: -1
            show_tokens:
                color: white
    right_trap_detected:
        right_trap_show:
            action: play
            loops: -1
        left_trap_show:
            action: stop
    right_trap_released:
        right_trap_show:
            action: stop
    left_trap_detected:
        left_trap_show:
            action: play
            loops: -1
        right_trap_show:
            action: stop
    left_trap_released:
        left_trap_show:
            action: stop
    relight_ramp_shots:
        ramp_lit_show:
            action: play
            loops: -1
            show_tokens:
                color: red
#shows for shots
    curve_left_shot_hit:
        base_lights_out_show:
            action: play
            loops: 0
            priority: 100
    curve_right_shot_hit:
        base_lights_out_show:
            action: play
            loops: 0
            priority: 100
    ramp_left_entry_shot_hit:
        ramp_lit_show:
            action: stop
        ramp_l_attempt_show:
            action: play
            loops: 0
            show_tokens:
                color: red
    left_uturn_shot_hit:
        ramp_l_complete_show:
            loops: 0
            show_tokens:
                color: red
    ramp_right_entry_shot_hit:
        ramp_lit_show:
            action: stop
        ramp_r_attempt_show:
            action: play
            loops: 0
            show_tokens:
                color: red
    right_uturn_shot_hit:
        ramp_r_complete_show:
            loops: 0
            show_tokens:
                color: red
    f_lane_shot_hit:
        lane_shot_hit_show:
            loops: 0
    l_lane_shot_hit:
        lane_shot_hit_show:
            loops: 0
    y_lane_shot_hit:
        lane_shot_hit_show:
            loops: 0
    right_approach_shot_hit:
        right_approach_show:
            loops: 0
    left_approach_shot_hit:
        left_approach_show:
            loops: 0
    slingshot_l_hit:
        left_sling_show:
            loops: 0
            speed: 1.5
    slingshot_r_hit:
        right_sling_show:
            loops: 0
            speed: 1.5

#ball save shows
    ball_save_ball_start_ball_save_timer_start:
        ball_save_active_show:
            loops: -1
    ball_save_ball_start_ball_save_hurry_up:
        ball_save_active_show:
            action: stop
        ball_save_hurryup_show:
            loops: 0




coil_player:
    mode_base_started:
        glow_coil: on
    ball_ending:
        glow_coil: off
    s_shooter_lane_active:
        c_glow_shooter_lane: on
    s_shooter_lane_inactive:
        c_glow_shooter_lane: off

timed_switches:
    trap_left:
        switches: s_left_flipper
        time: 3s
        events_when_active: left_trap_detected
        events_when_released: left_trap_released
    trap_right:
        switches: s_right_flipper
        time: 3s
        events_when_active: right_trap_detected
        events_when_released: right_trap_released


shots:
    curve_right_shot:
        switches: s_curve_right
        delay_switch:
            s_core_left: 2s
    curve_left_shot:
        switches: s_curve_left
        delay_switch:
            s_core_right: 2s
    center_spinner_shot:
        switches: s_center_spinner
    g_target_shot:
        switches: s_target_g
    l_target_shot:
        switches: s_target_l
    o_target_shot:
        switches: s_target_o
    w_target_shot:
        switches: s_target_w
    f_lane_shot:
        switches: s_lane_f
    l_lane_shot:
        switches: s_lane_l
    y_lane_shot:
        switches: s_lane_y
    ramp_right_entry_shot:
        switches: s_uramp_right
        delay_switch:
            s_uramp_left: 2s
    ramp_left_entry_shot:
        switches: s_uramp_left
        delay_switch:
            s_uramp_right: 2s
    slingshot_r:
        switches: s_right_sling
    slingshot_l:
        switches: s_left_sling
    shooter_lane_loaded:
        switches: s_shooter_lane
        disable_events: s_shooter_lane_inactive
    left_approach_shot:
        switches: s_left_approach
        delay_switch:
            s_right_approach: 4s
    right_approach_shot:
        switches: s_right_approach
        delay_switch:
            s_left_approach: 4s


sequence_shots:
    clockwise_core_shot:
        switch_sequence: s_core_left, s_core_right
        sequence_timeout: 3s
    counterwise_core_shot:
        switch_sequence: s_core_right, s_core_left
        sequence_timeout: 3s
    left_uturn_shot:
        switch_sequence: s_uramp_left, s_uramp_right
        sequence_timeout: 2s
    right_uturn_shot:
        switch_sequence: s_uramp_right, s_uramp_left
        sequence_timeout: 2s
    right_qp_full:
        switch_sequence: s_right_approach, s_left_approach
        sequence_timeout: 3s
    left_qp_full:
        switch_sequence: s_left_approach, s_right_approach
        sequence_timeout: 3s
    curve_right_core_shot:
        event_sequence: curve_right_shot_hit, clockwise_core_shot_hit
        sequence_timeout: 4s
    curve_left_core_shot:
        event_sequence: curve_left_shot_hit, counterwise_core_shot_hit
        sequence_timeout: 4s
    left_full_core_shot:
        event_sequence: curve_left_core_shot_hit, s_curve_right_active
        sequence_timeout: 2s
    right_full_core_shot:
        event_sequence: curve_right_core_shot_hit, s_curve_left_active
        sequence_timeout: 2s
    core_sneak_in:
        event_sequence: center_spinner_shot_hit, counterwise_core_shot_hit
        sequence_timeout: 3s

sound_player:
    shooter_lane_loaded_hit:
        glowfly_launch_wait:
            action: play
            loops: -1
    s_shooter_lane_inactive:
        glowfly_launch_wait:
            action: stop
        glowfly_infinity_main:
            action: play
    ball_ending:
        glowfly_infinity_main:
            action: stop
    curve_left_shot_hit:
        left_1:
            action: play
    curve_right_shot_hit:
        right_1:
            action: play
    s_core_left_active:
        left_2b:
            action: play
    s_core_right_active:
        left_2a:
            action: play
    left_full_core_shot_hit:
        left_3:
            action: play
    right_full_core_shot_hit:
        right_3:
            action: play
    slingshot_l_hit:
        slingsounds:
            action: play
    slingshot_r_hit:
        slingsounds:
            action: play
    right_uturn_shot_hit:
        ramp_r:
            action: play
    left_uturn_shot_hit:
        ramp_l:
            action: play
    f_lane_shot_hit:
        fairy_sounds:
            action: play
    l_lane_shot_hit:
        fairy_sounds:
            action: play
    y_lane_shot_hit:
        fairy_sounds:
            action: play

variable_player:
    curve_right_shot_hit:
        score: 1000 * current_player.curve_x
    curve_left_shot_hit:
        score: 1000 * current_player.curve_x
    curve_left_core_shot_hit:
        score: 5000 * current_player.curve_x
        core_x: 1
    curve_right_core_shot_hit:
        score: 5000 * current_player.curve_x
        core_x: 1
    left_full_core_shot_hit:
        score: 10000 * (current_player.curve_x + current_player.core_x)
        curve_x: 1
    right_full_core_shot_hit:
        score: 10000 * (current_player.curve_x + current_player.core_x)
        curve_x: 1
    left_uturn_shot_hit:
        score: 2500 * current_player.ramp_x
        ramp_x: 1
    right_uturn_shot_hit:
        score: 2500 * current_player.ramp_x
        ramp_x: 1
    slingshot_l_hit:
        score: 125
    slingshot_r_hit:
        score: 125
    g_target_shot_hit:
        score: 500
    l_target_shot_hit:
        score: 500
    o_target_shot_hit:
        score: 500
    w_target_shot_hit:
        score: 500
    f_lane_shot_hit:
        score: 1000
    l_lane_shot_hit:
        score: 1000
    y_lane_shot_hit:
        score: 1000
