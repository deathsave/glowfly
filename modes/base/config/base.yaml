    ball_save_ball_start_ball_save_hurry_up:
        ball_save_active_show:
            action: stop
        ball_save_hurryup_show:
            loops: 0




coil_player:
    mode_base_started:
        glow_coil: on
    ball_ending:
        glow_coil: off
    s_shooter_lane_active:
        c_glow_shooter_lane: on
    s_shooter_lane_inactive:
        c_glow_shooter_lane: off

timed_switches:
    trap_left:
        switches: s_left_flipper
        time: 2s
        events_when_active: left_trap_detected
        events_when_released: left_trap_released
    trap_right:
        switches: s_right_flipper
        time: 2s
        events_when_active: right_trap_detected
        events_when_released: right_trap_released

