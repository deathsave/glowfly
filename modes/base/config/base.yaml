                events_when_started: w_target_hit
        transitions:
            - source: lit
              target: hit
              events: w_target_shot_hit
            - source: hit
              target: lit
              events: reset_glowfly_targets
    f_lane_status:
        starting_state: lit
        states:
            lit:
                label: Start state
                events_when_started: f_lane_lit
            hit:
                show_when_active:
                    show: f_lane_light_show
                events_when_started: f_lane_hit
        transitions:
            - source: lit
              target: hit
              events: f_lane_shot_hit
            - source: hit
              target: lit
              events: reset_glowfly_targets
    l_lane_status:
        starting_state: lit
